  version: 0.2.0-rc.1
  x-camara-commonalities: 0.8.0
servers:
  - url: '{apiRoot}/qa-assistant-service/v0.2rc1'
    variables:
      apiRoot:
        default: http://localhost:9091
        description: API root, defined by the service provider, e.g. `api.example.com` or `api.example.com/somepath`
tags:
  - name: Query
    description: Q&A assistant query operations
externalDocs:
  description: Product documentation at CAMARA
  url: https://github.com/camaraproject/ModelAsAService
paths:
  /answer:
    post:
      operationId: queryAssistant
      summary: Get an answer from a QA assistant
      description: |
        Queries a configured QA assistant to generate answers using knowledge bases and LLMs.

        **Key Features:**
        - Utilizes pre-configured assistant settings (prompts, model parameters)
        - Leverages associated knowledge bases for contextual responses
        - Provides termination status for answer generation

        **Key Rules:**
        - Requires valid UUID `assistantId`
        - `prompt` must be 1-1000 characters
        - Needs `qa-assistant-service:answer:read` scope
        - Assistant must be properly configured and accessible

        **Response Characteristics:**
        - **200 OK**: Returns `QueryResponse` with answer text and termination status
          - `finished` indicates generation completion reason (STOP / LENGTH / ERROR / FILTER)
          - `reference` shows knowledge base source when available
        - **400 Bad Request**:
          - Missing/invalid prompt
          - Invalid assistantId format
          - Prompt length exceeds limits
        - **401 Unauthenticated**: Missing/invalid credentials
        - **403 Forbidden**:
          - Missing required scope
          - Token/assistantId mismatch
        - **404 Not Found**:
          - Assistant doesn't exist
          - Identifier not found
        - **500 Internal Server Error**:
          - LLM processing failure
          - Knowledge base access error
      tags:
        - Query
      parameters:
        - $ref: '#/components/parameters/x-correlator'
      security:
        - openId:
            - qa-assistant-service:answer:read
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryRequest'
      responses:
        '200':
          description: Successful answer retrieval
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '404':
          $ref: '#/components/responses/Generic404'
        '500':
          $ref: '#/components/responses/Generic500'
components:
  securitySchemes:
    openId:
      type: openIdConnect
      openIdConnectUrl: https://example.com/.well-known/openid-configuration
      description: OpenID Connect authentication via discovery metadata.
  parameters:
    x-correlator:
      name: x-correlator
      in: header
      description: Correlation id for the different services
      schema:
        $ref: '#/components/schemas/XCorrelator'
  headers:
    x-correlator:
      description: Correlation id for the different services
      schema:
        $ref: '#/components/schemas/XCorrelator'
  schemas:
    QueryRequest:
      type: object
      description: Request payload for querying a QA assistant
      required:
        - assistantId
        - prompt
      additionalProperties: false
      properties:
        assistantId:
          type: string
          format: uuid
          maxLength: 36
          description: Unique identifier of the QA assistant to query
          example: a1b2c3d4-5678-90ab-cdef-1234567890ab
        prompt:
          type: string
          minLength: 1
          maxLength: 1000
          description: The user's question or query to send to the assistant
          example: How do I reset my password?
    QueryResponse:
      type: object
      description: Response payload containing the assistant's generated answer
      required:
        - success
        - finished
        - answerText
      properties:
        success:
          type: boolean
          description: Indicates whether the query was processed successfully by the assistant
        finished:
          type: string
          maxLength: 32
          description: Termination status of the response generation (STOP = normal completion, LENGTH = truncated, ERROR = generation error, FILTER = content filtered)
          enum:
            - STOP
            - LENGTH
            - ERROR
            - FILTER
          example: STOP
        answerText:
          type: string
          maxLength: 65535
          description: The assistant's generated answer text
          example: To reset your password, go to settings > security...
        reference:
          type: string
          maxLength: 255
          description: Optional reference identifier to the knowledge base source used for the answer
          example: kb123_section5
    XCorrelator:
      type: string
      description: Correlator string, UUID format recommended but any string matching the pattern can be used
      pattern: ^[a-zA-Z0-9-_:;.\/<>{}]{0,256}$
      maxLength: 256
      example: b4333c46-49c0-4f62-80d7-f0ef930f1c46
    ErrorInfo:
      type: object
      description: A structured error response providing details about a failed request, including the HTTP status code, an error code, and a human-readable message
      required:
        - status
        - code
        - message
      properties:
        status:
          type: integer
          format: int32
          minimum: 100
          maximum: 599
          description: HTTP response status code
        code:
          type: string
          maxLength: 96
          description: A human-readable code to describe the error
        message:
          type: string
          maxLength: 512
          description: A human-readable description of what the event represents
  responses:
    Generic400:
      description: Bad Request
      headers:
        x-correlator:
          $ref: '#/components/headers/x-correlator'
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ErrorInfo'
              - type: object
                properties:
                  status:
                    enum:
                      - 400
                  code:
                    enum:
                      - INVALID_ARGUMENT
                      - OUT_OF_RANGE
          examples:
            GENERIC_400_INVALID_ARGUMENT:
              description: Invalid Argument. Generic Syntax Exception
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: Client specified an invalid argument, request body or query param.
            GENERIC_400_OUT_OF_RANGE:
              description: Out of Range. Specific Syntax Exception used when a given field has a pre-defined range or a invalid filter criteria combination is requested
              value:
                status: 400
                code: OUT_OF_RANGE
                message: Client specified an invalid range.
    Generic401:
      description: Unauthorized
      headers:
        x-correlator:
          $ref: '#/components/headers/x-correlator'
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ErrorInfo'
              - type: object
                properties:
                  status:
                    enum:
                      - 401
                  code:
                    enum:
                      - UNAUTHENTICATED
          examples:
            GENERIC_401_UNAUTHENTICATED:
              description: Request cannot be authenticated and a new authentication is required
              value:
                status: 401
                code: UNAUTHENTICATED
                message: Request not authenticated due to missing, invalid, or expired credentials. A new authentication is required.
    Generic403:
      description: Forbidden
      headers:
        x-correlator:
          $ref: '#/components/headers/x-correlator'
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ErrorInfo'
              - type: object
                properties:
                  status:
                    enum:
                      - 403
                  code:
                    enum:
                      - PERMISSION_DENIED
                      - INVALID_TOKEN_CONTEXT
          examples:
            GENERIC_403_PERMISSION_DENIED:
              description: Permission denied. OAuth2 token access does not have the required scope or when the user fails operational security
              value:
                status: 403
                code: PERMISSION_DENIED
                message: Client does not have sufficient permissions to perform this action.
            GENERIC_403_INVALID_TOKEN_CONTEXT:
              description: Reflect some inconsistency between information in some field of the API and the related OAuth2 Token
              value:
                status: 403
                code: INVALID_TOKEN_CONTEXT
                message: Request body is not consistent with access token.
    Generic404:
      description: Not found
      headers:
        x-correlator:
          $ref: '#/components/headers/x-correlator'
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ErrorInfo'
              - type: object
                properties:
                  status:
                    enum:
                      - 404
                  code:
                    enum:
                      - NOT_FOUND
                      - IDENTIFIER_NOT_FOUND
          examples:
            GENERIC_404_NOT_FOUND:
              description: Resource is not found
              value:
                status: 404
                code: NOT_FOUND
                message: The specified resource is not found.
            GENERIC_404_IDENTIFIER_NOT_FOUND:
              description: Some identifier cannot be matched to a device
              value:
                status: 404
                code: IDENTIFIER_NOT_FOUND
                message: Device identifier not found.
    Generic500:
      description: Internal Server Error
      headers:
        x-correlator:
          $ref: '#/components/headers/x-correlator'
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ErrorInfo'
              - type: object
                properties:
                  status:
                    enum:
                      - 500
                  code:
                    enum:
                      - INTERNAL
          examples:
            GENERIC_500_INTERNAL:
              description: Problem in Server side. Regular Server Exception
              value:
                status: 500
                code: INTERNAL
                message: Unknown server error. Typically a server bug.
