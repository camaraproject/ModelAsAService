externalDocs:
  description: Product documentation at CAMARA
  url: https://github.com/camaraproject/ModelAsAService

servers:
  - url: '{apiRoot}/qa-assistant-service/vwip'
    variables:
      apiRoot:
        default: http://localhost:9091
        description: API root, defined by the service provider, e.g. `api.example.com` or `api.example.com/somepath`

tags:
  - name: Query
    description: Q&A assistant query operations

paths:
  /answer:
    post:
      operationId: queryAssistant
      summary: Get an answer from a QA assistant
      description: |
        Queries a configured QA assistant to generate answers using knowledge bases and LLMs.

        **Key Features:**
        - Utilizes pre-configured assistant settings (prompts, model parameters)
        - Leverages associated knowledge bases for contextual responses
        - Provides termination status for answer generation

        **Key Rules:**
        - Requires valid UUID `assistantId`
        - `prompt` must be 1-1000 characters
        - Needs `qa-assistant-service:answer:read` scope
        - Assistant must be properly configured and accessible

        **Response Characteristics:**
        - **200 OK**: Returns `QueryResponse` with answer text and termination status
          - `finished` indicates generation completion reason (STOP / LENGTH / ERROR / FILTER)
          - `reference` shows knowledge base source when available
        - **400 Bad Request**:
          - Missing/invalid prompt
          - Invalid assistantId format
          - Prompt length exceeds limits
        - **401 Unauthenticated**: Missing/invalid credentials
        - **403 Forbidden**:
          - Missing required scope
          - Token/assistantId mismatch
        - **404 Not Found**:
          - Assistant doesn't exist
          - Identifier not found
        - **500 Internal Server Error**:
          - LLM processing failure
          - Knowledge base access error
      tags:
        - Query
      parameters:
        - $ref: '#/components/parameters/x-correlator'  # Added correlator
      security:
        - openId:
            - qa-assistant-service:answer:read
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryRequest'
      responses:
        '200':
          description: Successful answer retrieval
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '404':
          $ref: '#/components/responses/Generic404'
        '500':
          $ref: '#/components/responses/Generic500'

components:
  securitySchemes:
    openId:
      $ref: "../common/CAMARA_common.yaml#/components/securitySchemes/openId"

  parameters:
    x-correlator:
      $ref: "../common/CAMARA_common.yaml#/components/parameters/x-correlator"

  headers:
    x-correlator:
      $ref: "../common/CAMARA_common.yaml#/components/headers/x-correlator"

  schemas:
    QueryRequest:
      type: object
      required:
        - assistantId
        - prompt
      additionalProperties: false
      properties:
        assistantId:
          type: string
          format: uuid
          maxLength: 36
          description: Unique identifier of the QA assistant
          example: "a1b2c3d4-5678-90ab-cdef-1234567890ab"
        prompt:
          type: string
          minLength: 1
          maxLength: 1000
          description: The user's question or query
          example: "How do I reset my password?"

    QueryResponse:
      type: object
      required:
        - success
        - finished
        - answerText
      properties:
        success:
          type: boolean
          description: Indicates whether the query was processed successfully
        finished:
          type: string
          maxLength: 32
          description: Termination status of the response generation
          enum:
            - STOP
            - LENGTH
            - ERROR
            - FILTER
          example: "STOP"
        answerText:
          type: string
          maxLength: 65535
          description: The assistant's generated answer
          example: "To reset your password, go to settings > security..."
        reference:
          type: string
          maxLength: 255
          description: Optional reference to the knowledge base source
          example: "kb123_section5"

    ErrorInfo:
      $ref: "../common/CAMARA_common.yaml#/components/schemas/ErrorInfo"

  responses:
    Generic400:
      $ref: "../common/CAMARA_common.yaml#/components/responses/Generic400"
    Generic401:
      $ref: "../common/CAMARA_common.yaml#/components/responses/Generic401"
    Generic403:
      $ref: "../common/CAMARA_common.yaml#/components/responses/Generic403"
    Generic404:
      $ref: "../common/CAMARA_common.yaml#/components/responses/Generic404"
    Generic500:
      $ref: "../common/CAMARA_common.yaml#/components/responses/Generic500"
