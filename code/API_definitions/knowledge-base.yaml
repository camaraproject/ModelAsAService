openapi: 3.0.3
info:
  title: Knowledge Base
  description: |
    This API offers comprehensive CRUD (Create, Read, Update, Delete) management capabilities for the knowledge base, along with document uploading functionality.
    It is designed to provide applications with standardized capabilities for knowledge content storage and management, supporting multi-format document storage, fine-grained permission control, and end-to-end traceability.
    It is suitable for building knowledge-intensive systems (such as intelligent customer service platforms and enterprise document platforms) while ensuring compliance.
    This API allows the API consumer to perform CRUD operations on the knowledge base hosted on the server.
    The following scopes are required:
    - knowledge-base:knowledge-bases:create - Create new knowledge bases
    - knowledge-base:knowledge-bases:read - Read knowledge base entries
    - knowledge-base:knowledge-bases:update - Update existing knowledge bases
    - knowledge-base:knowledge-bases:delete - Delete knowledge bases
    - knowledge-base:documents:create - Upload documents to knowledge bases
    - knowledge-base:tools:create - Create new tools
    - knowledge-base:tools:read - Read tool entries
    - knowledge-base:tools:update - Update existing tools
    - knowledge-base:tools:delete - Delete tools
    - knowledge-base:tools:call - Invoke tools

    <!-- CAMARA:MANDATORY:authorization-and-authentication:BEGIN -->
    # Authorization and authentication

    The "Camara Security and Interoperability Profile" provides details of how an API consumer requests an access token. Please refer to Identity and Consent Management (https://github.com/camaraproject/IdentityAndConsentManagement/) for the released version of the profile.

    The specific authorization flows to be used will be agreed upon during the onboarding process, happening between the API consumer and the API provider, taking into account the declared purpose for accessing the API, whilst also being subject to the prevailing legal framework dictated by local legislation.

    In cases where personal data is processed by the API and users can exercise their rights through mechanisms such as opt-in and/or opt-out, the use of three-legged access tokens is mandatory. This ensures that the API remains in compliance with privacy regulations, upholding the principles of transparency and user-centric privacy-by-design.
    <!-- CAMARA:MANDATORY:authorization-and-authentication:END -->

    <!-- CAMARA:MANDATORY:additional-error-responses:BEGIN -->
    # Additional CAMARA error responses

    The list of error codes in this API specification is not exhaustive. Therefore the API specification MAY not document some non-mandatory error statuses as indicated in `CAMARA API Design Guide`.

    Please refer to the `CAMARA_common.yaml` of the Commonalities Release associated to this API version for a complete list of error responses. The applicable Commonalities Release can be identified in the `API Readiness Checklist` document associated to this API version.

    As a specific rule, error `501 - NOT_IMPLEMENTED` can be only a possible error response if it is explicitly documented in the API.
    <!-- CAMARA:MANDATORY:additional-error-responses:END -->

    <!-- CAMARA:MANDATORY:request-body-strictness:BEGIN -->
    # Request body strictness

    This API rejects requests with JSON request bodies that contain properties not declared in this specification, at any nesting level. Unknown properties result in a `400 INVALID_ARGUMENT` response.
    <!-- CAMARA:MANDATORY:request-body-strictness:END -->

  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: 0.2.0-rc.1
  x-camara-commonalities: 0.8.0

externalDocs:
  description: Product documentation at CAMARA
  url: https://github.com/camaraproject/ModelAsAService

servers:
  - url: '{apiRoot}/knowledge-base/v0.2rc1'
    variables:
      apiRoot:
        default: http://localhost:9091
        description: API root, defined by the service provider, e.g. `api.example.com` or `api.example.com/somepath`

tags:
  - name: Knowledge Base
    description: Knowledge base management
  - name: Documents
    description: Document upload operations
  - name: Tools
    description: Tool definition and execution operations

paths:
  /knowledge-bases:
    post:
      operationId: createKnowledgeBase
      summary: Create a new knowledge base
      description: |
        Creates a new knowledge base with the provided metadata.

        **Key Features:**
        - Initializes a new knowledge base container
        - Stores name and description metadata
        - Generates unique knowledgeBaseId

        **Key Rules:**
        - Requires `name` field in request body
        - Requires `knowledge-base:knowledge-bases:create` scope
        - Name must be unique within the system

        **Response Characteristics:**
        - **201 Created**: Returns full `KnowledgeBase` object with generated ID
        - **400 Bad Request**: Missing `name` or invalid parameters
        - **403 Forbidden**: Missing required scope
        - **500 Internal Server Error**: Backend processing failure
      tags:
        - Knowledge Base
      parameters:
        - $ref: '#/components/parameters/x-correlator'  # Added correlator
      security:
        - openId:
            - knowledge-base:knowledge-bases:create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KnowledgeBaseCreateRequest'
      responses:
        '201':
          description: Knowledge base created successfully
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeBase'
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '500':
          $ref: '#/components/responses/Generic500'

    get:
      operationId: listKnowledgeBases
      summary: Get all knowledge bases
      description: |
        Retrieves all knowledge bases accessible to the authenticated user.

        **Key Features:**
        - Returns complete collection of knowledge bases
        - Includes metadata and document lists
        - Supports pagination (implied by array response)

        **Key Rules:**
        - Requires `knowledge-base:knowledge-bases:read` scope
        - Returns empty array if no knowledge bases exist

        **Response Characteristics:**
        - **200 OK**: Array of `KnowledgeBase` objects
        - **401 Unauthenticated**: Invalid/missing credentials
        - **403 Forbidden**: Insufficient permissions
        - **500 Internal Server Error**: Data retrieval failure
      tags:
        - Knowledge Base
      parameters:
        - $ref: '#/components/parameters/x-correlator'
        - $ref: '../common/CAMARA_common.yaml#/components/parameters/page'
        - $ref: '../common/CAMARA_common.yaml#/components/parameters/perPage'
      security:
        - openId:
            - knowledge-base:knowledge-bases:read
      responses:
        '200':
          description: List of knowledge bases
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    minItems: 0
                    maxItems: 1000
                    items:
                      $ref: '#/components/schemas/KnowledgeBase'
                  pagination:
                    $ref: '../common/CAMARA_common.yaml#/components/schemas/Pagination'
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '500':
          $ref: '#/components/responses/Generic500'

  /knowledge-bases/{knowledgeBaseId}:
    parameters:
      - name: knowledgeBaseId
        in: path
        required: true
        schema:
          type: string
          format: uuid
          maxLength: 36
        description: ID of the knowledge base
      - $ref: '#/components/parameters/x-correlator'  # Added correlator

    get:
      operationId: getKnowledgeBase
      summary: Get a specific knowledge base
      description: |
        Retrieves metadata and document list for a specific knowledge base.

        **Key Features:**
        - Returns detailed metadata (name, description)
        - Includes list of documents with filenames/formats
        - Provides document upload timestamps

        **Key Rules:**
        - Requires valid `knowledgeBaseId` path parameter
        - Requires `knowledge-base:knowledge-bases:read` scope

        **Response Characteristics:**
        - **200 OK**: Complete `KnowledgeBase` object
        - **404 Not Found**: Invalid/non-existent knowledgeBaseId
        - **403 Forbidden**: Missing required scope
        - **500 Internal Server Error**: Data retrieval failure
      tags:
        - Knowledge Base
      security:
        - openId:
            - knowledge-base:knowledge-bases:read
      responses:
        '200':
          description: Knowledge base details
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeBase'
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '404':
          $ref: '#/components/responses/Generic404'
        '500':
          $ref: '#/components/responses/Generic500'

    put:
      operationId: updateKnowledgeBase
      summary: Update a knowledge base
      description: |
        Updates metadata of an existing knowledge base.

        **Key Features:**
        - Modifies name and/or description
        - Preserves existing document associations
        - Returns updated metadata

        **Key Rules:**
        - Requires at least one update field (name/description)
        - Requires `knowledge-base:knowledge-bases:update` scope
        - knowledgeBaseId must exist

        **Response Characteristics:**
        - **200 OK**: Updated `KnowledgeBase` object
        - **400 Bad Request**: No update fields provided
        - **404 Not Found**: Invalid knowledgeBaseId
        - **403 Forbidden**: Missing required scope
        - **500 Internal Server Error**: Update processing failure
      tags:
        - Knowledge Base
      security:
        - openId:
            - knowledge-base:knowledge-bases:update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KnowledgeBaseUpdateRequest'
      responses:
        '200':
          description: Knowledge base updated successfully
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeBase'
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '404':
          $ref: '#/components/responses/Generic404'
        '500':
          $ref: '#/components/responses/Generic500'

    delete:
      operationId: deleteKnowledgeBase
      summary: Delete a knowledge base
      description: |
        Permanently deletes a knowledge base and its documents.

        **Key Features:**
        - Removes knowledge base metadata
        - Deletes all associated documents
        - Irreversible operation

        **Key Rules:**
        - Requires valid `knowledgeBaseId`
        - Requires `knowledge-base:knowledge-bases:delete` scope
        - No partial deletions

        **Response Characteristics:**
        - **204 No Content**: Successful deletion (no body)
        - **404 Not Found**: Invalid knowledgeBaseId
        - **403 Forbidden**: Missing required scope
        - **500 Internal Server Error**: Deletion processing failure
      tags:
        - Knowledge Base
      security:
        - openId:
            - knowledge-base:knowledge-bases:delete
      responses:
        '204':
          description: Knowledge base deleted successfully
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '404':
          $ref: '#/components/responses/Generic404'
        '500':
          $ref: '#/components/responses/Generic500'

  /knowledge-bases/{knowledgeBaseId}/documents:
    post:
      operationId: uploadDocument
      summary: Upload a document to a knowledge base
      description: |
        Uploads a document to a knowledge base.

        **Key Features:**
        - Supports doc/pdf/txt/csv formats
        - Stores filename and format metadata
        - Records upload timestamp

        **Key Rules:**
        - Requires valid `knowledgeBaseId`
        - Requires `knowledge-base:documents:create` scope
        - File must be sent as multipart/form-data
        - Maximum file size determined by implementation

        **Response Characteristics:**
        - **201 Created**: Success message with filename
        - **400 Bad Request**: Invalid file format
        - **415 Unsupported Media Type**: Unacceptable format
        - **404 Not Found**: Invalid knowledgeBaseId
        - **403 Forbidden**: Missing required scope
        - **500 Internal Server Error**: Storage failure
      tags:
        - Documents
      parameters:
        - name: knowledgeBaseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
            maxLength: 36
          description: ID of the knowledge base
        - $ref: '#/components/parameters/x-correlator'  # Added correlator
      security:
        - openId:
            - knowledge-base:documents:create
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                document:
                  type: string
                  format: binary
              required:
                - document
        required: true
      responses:
        '201':
          description: Document uploaded successfully
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    maxLength: 256
                    description: Confirmation message for the uploaded document
                    example: "Document uploaded successfully"
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '404':
          $ref: '#/components/responses/Generic404'
        '415':
          $ref: '#/components/responses/Generic415'
        '500':
          $ref: '#/components/responses/Generic500'

  /knowledge-bases/{knowledgeBaseId}/tools:
    post:
      operationId: createTool
      summary: Register a new tool
      description: |
        Registers a new tool in the knowledge base. A tool defines an external
        callable capability with a URL, HTTP method, and optional input/output schemas
        — similar to MCP (Model Context Protocol) tool definitions.

        **Key Features:**
        - Defines tool name, description, and endpoint URL
        - Supports multiple HTTP methods (GET, POST, PUT, DELETE)
        - Optionally describes input and output schemas

        **Key Rules:**
        - Requires valid `knowledgeBaseId`
        - `name` and `url` are required
        - Requires `knowledge-base:tools:create` scope

        **Response Characteristics:**
        - **201 Created**: Returns full `Tool` object with generated toolId
        - **400 Bad Request**: Missing required fields or invalid parameters
        - **403 Forbidden**: Missing required scope
        - **404 Not Found**: Invalid knowledgeBaseId
        - **500 Internal Server Error**: Tool creation failure
      tags:
        - Tools
      parameters:
        - name: knowledgeBaseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
            maxLength: 36
          description: ID of the knowledge base
        - $ref: '#/components/parameters/x-correlator'
      security:
        - openId:
            - knowledge-base:tools:create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToolCreateRequest'
      responses:
        '201':
          description: Tool created successfully
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tool'
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '404':
          $ref: '#/components/responses/Generic404'
        '500':
          $ref: '#/components/responses/Generic500'

    get:
      operationId: listTools
      summary: List all tools in a knowledge base
      description: |
        Retrieves all registered tools in the specified knowledge base.

        **Key Features:**
        - Returns complete collection of tools
        - Includes tool metadata (name, URL, method, schemas)
        - Supports pagination

        **Key Rules:**
        - Requires valid `knowledgeBaseId`
        - Requires `knowledge-base:tools:read` scope
        - Returns empty array if no tools exist

        **Response Characteristics:**
        - **200 OK**: Array of `Tool` objects with pagination
        - **401 Unauthenticated**: Invalid/missing credentials
        - **403 Forbidden**: Insufficient permissions
        - **404 Not Found**: Invalid knowledgeBaseId
        - **500 Internal Server Error**: Data retrieval failure
      tags:
        - Tools
      parameters:
        - name: knowledgeBaseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
            maxLength: 36
          description: ID of the knowledge base
        - $ref: '#/components/parameters/x-correlator'
        - $ref: '../common/CAMARA_common.yaml#/components/parameters/page'
        - $ref: '../common/CAMARA_common.yaml#/components/parameters/perPage'
      security:
        - openId:
            - knowledge-base:tools:read
      responses:
        '200':
          description: List of tools
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    minItems: 0
                    maxItems: 1000
                    items:
                      $ref: '#/components/schemas/Tool'
                  pagination:
                    $ref: '../common/CAMARA_common.yaml#/components/schemas/Pagination'
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '404':
          $ref: '#/components/responses/Generic404'
        '500':
          $ref: '#/components/responses/Generic500'

  /knowledge-bases/{knowledgeBaseId}/tools/{toolId}:
    parameters:
      - name: knowledgeBaseId
        in: path
        required: true
        schema:
          type: string
          format: uuid
          maxLength: 36
        description: ID of the knowledge base
      - name: toolId
        in: path
        required: true
        schema:
          type: string
          format: uuid
          maxLength: 36
        description: ID of the tool
      - $ref: '#/components/parameters/x-correlator'

    get:
      operationId: getTool
      summary: Get a specific tool
      description: |
        Retrieves details of a specific tool registered in the knowledge base.

        **Key Features:**
        - Returns full tool definition including URL, method, and schemas
        - Provides creation and update timestamps

        **Key Rules:**
        - Requires valid `knowledgeBaseId` and `toolId`
        - Requires `knowledge-base:tools:read` scope

        **Response Characteristics:**
        - **200 OK**: Complete `Tool` object
        - **404 Not Found**: Invalid toolId or knowledgeBaseId
        - **403 Forbidden**: Missing required scope
        - **500 Internal Server Error**: Data retrieval failure
      tags:
        - Tools
      security:
        - openId:
            - knowledge-base:tools:read
      responses:
        '200':
          description: Tool details
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tool'
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '404':
          $ref: '#/components/responses/Generic404'
        '500':
          $ref: '#/components/responses/Generic500'

    put:
      operationId: updateTool
      summary: Update a tool
      description: |
        Updates the definition of an existing tool.

        **Key Features:**
        - Modifies tool name, URL, method, headers, or schemas
        - Returns updated tool definition

        **Key Rules:**
        - Requires valid `knowledgeBaseId` and `toolId`
        - At least one update field must be provided
        - Requires `knowledge-base:tools:update` scope

        **Response Characteristics:**
        - **200 OK**: Updated `Tool` object
        - **400 Bad Request**: No update fields provided
        - **404 Not Found**: Invalid toolId
        - **403 Forbidden**: Missing required scope
        - **500 Internal Server Error**: Update processing failure
      tags:
        - Tools
      security:
        - openId:
            - knowledge-base:tools:update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToolUpdateRequest'
      responses:
        '200':
          description: Tool updated successfully
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tool'
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '404':
          $ref: '#/components/responses/Generic404'
        '500':
          $ref: '#/components/responses/Generic500'

    delete:
      operationId: deleteTool
      summary: Delete a tool
      description: |
        Permanently removes a tool definition from the knowledge base.

        **Key Features:**
        - Irreversible deletion
        - Removes tool metadata

        **Key Rules:**
        - Requires valid `knowledgeBaseId` and `toolId`
        - Requires `knowledge-base:tools:delete` scope
        - Cannot be undone

        **Response Characteristics:**
        - **204 No Content**: Successful deletion (no body)
        - **404 Not Found**: Invalid toolId
        - **403 Forbidden**: Missing required scope
        - **500 Internal Server Error**: Deletion processing failure
      tags:
        - Tools
      security:
        - openId:
            - knowledge-base:tools:delete
      responses:
        '204':
          description: Tool deleted successfully
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '404':
          $ref: '#/components/responses/Generic404'
        '500':
          $ref: '#/components/responses/Generic500'

  /knowledge-bases/{knowledgeBaseId}/tools/{toolId}/call:
    post:
      operationId: callTool
      summary: Invoke a tool
      description: |
        Invokes a registered tool with the provided arguments. The tool will be
        executed according to its definition (URL, method, headers) and the
        result will be returned.

        **Key Features:**
        - Passes arguments to the tool's external endpoint
        - Returns the tool's execution result
        - Reports HTTP status code from the tool invocation

        **Key Rules:**
        - Requires valid `knowledgeBaseId` and `toolId`
        - Requires `knowledge-base:tools:call` scope
        - Tool must be properly defined and accessible

        **Response Characteristics:**
        - **200 OK**: Returns `ToolCallResponse` with execution result
        - **400 Bad Request**: Invalid arguments
        - **404 Not Found**: Invalid toolId or knowledgeBaseId
        - **403 Forbidden**: Missing required scope
        - **500 Internal Server Error**: Tool execution failure
      tags:
        - Tools
      parameters:
        - name: knowledgeBaseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
            maxLength: 36
          description: ID of the knowledge base
        - name: toolId
          in: path
          required: true
          schema:
            type: string
            format: uuid
            maxLength: 36
          description: ID of the tool
        - $ref: '#/components/parameters/x-correlator'
      security:
        - openId:
            - knowledge-base:tools:call
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToolCallRequest'
      responses:
        '200':
          description: Tool executed successfully
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolCallResponse'
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '404':
          $ref: '#/components/responses/Generic404'
        '500':
          $ref: '#/components/responses/Generic500'

components:
  securitySchemes:
    openId:
      $ref: "../common/CAMARA_common.yaml#/components/securitySchemes/openId"

  parameters:
    x-correlator:
      $ref: "../common/CAMARA_common.yaml#/components/parameters/x-correlator"

  headers:
    x-correlator:
      $ref: "../common/CAMARA_common.yaml#/components/headers/x-correlator"

  schemas:
    KnowledgeBase:
      type: object
      properties:
        knowledgeBaseId:
          type: string
          format: uuid
          maxLength: 36
          description: Unique identifier of the knowledge base
        name:
          type: string
          maxLength: 255
          description: Name of the knowledge base
        description:
          type: string
          maxLength: 4096
          description: Detailed description of the knowledge base
        documents:
          type: array
          maxItems: 1000
          items:
            type: object
            required:
              - filename
              - format
              - uploadDate
            properties:
              filename:
                type: string
                maxLength: 255
                description: Name of the document file
              format:
                type: string
                enum: [DOC, PDF, TXT, CSV]
                maxLength: 10
                description: File format
              uploadDate:
                $ref: "../common/CAMARA_common.yaml#/components/schemas/DateTime"
          description: List of documents in the knowledge base

    KnowledgeBaseCreateRequest:
      type: object
      required:
        - name
      additionalProperties: false
      properties:
        name:
          type: string
          maxLength: 255
          description: Name of the knowledge base
        description:
          type: string
          maxLength: 4096
          description: Detailed description of the knowledge base

    KnowledgeBaseUpdateRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          maxLength: 255
          description: New name of the knowledge base
        description:
          type: string
          maxLength: 4096
          description: New description of the knowledge base

    Tool:
      type: object
      properties:
        toolId:
          type: string
          format: uuid
          maxLength: 36
          description: Unique identifier of the tool
        name:
          type: string
          maxLength: 255
