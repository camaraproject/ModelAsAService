openapi: 3.0.3
info:
  title: Knowledge Base
  description: |
    This API offers comprehensive CRUD (Create, Read, Update, Delete) management capabilities for the knowledge base, along with document uploading functionality.
    It is designed to provide applications with standardized capabilities for knowledge content storage and management, supporting multi-format document storage, fine-grained permission control, and end-to-end traceability.
    It is suitable for building knowledge-intensive systems (such as intelligent customer service platforms and enterprise document platforms) while ensuring compliance.
    This API allows the API consumer to perform CRUD operations on the knowledge base hosted on the server.
    The following scopes are required:
    - knowledge-base:knowledge-bases:create - Create new knowledge bases
    - knowledge-base:knowledge-bases:read - Read knowledge base entries
    - knowledge-base:knowledge-bases:update - Update existing knowledge bases
    - knowledge-base:knowledge-bases:delete - Delete knowledge bases
    - knowledge-base:documents:create - Upload documents to knowledge bases
    - knowledge-base:tools:create - Create new tools
    - knowledge-base:tools:read - Read tool entries
    - knowledge-base:tools:update - Update existing tools
    - knowledge-base:tools:delete - Delete tools
    - knowledge-base:tools:call - Invoke tools

    <!-- CAMARA:MANDATORY:authorization-and-authentication:BEGIN -->
    # Authorization and authentication

    The "Camara Security and Interoperability Profile" provides details of how an API consumer requests an access token. Please refer to Identity and Consent Management (https://github.com/camaraproject/IdentityAndConsentManagement/) for the released version of the profile.

    The specific authorization flows to be used will be agreed upon during the onboarding process, happening between the API consumer and the API provider, taking into account the declared purpose for accessing the API, whilst also being subject to the prevailing legal framework dictated by local legislation.

    In cases where personal data is processed by the API and users can exercise their rights through mechanisms such as opt-in and/or opt-out, the use of three-legged access tokens is mandatory. This ensures that the API remains in compliance with privacy regulations, upholding the principles of transparency and user-centric privacy-by-design.
    <!-- CAMARA:MANDATORY:authorization-and-authentication:END -->

    <!-- CAMARA:MANDATORY:additional-error-responses:BEGIN -->
    # Additional CAMARA error responses

    The list of error codes in this API specification is not exhaustive. Therefore the API specification MAY not document some non-mandatory error statuses as indicated in `CAMARA API Design Guide`.

    Please refer to the `CAMARA_common.yaml` of the Commonalities Release associated to this API version for a complete list of error responses. The applicable Commonalities Release can be identified in the `API Readiness Checklist` document associated to this API version.

    As a specific rule, error `501 - NOT_IMPLEMENTED` can be only a possible error response if it is explicitly documented in the API.
    <!-- CAMARA:MANDATORY:additional-error-responses:END -->

    <!-- CAMARA:MANDATORY:request-body-strictness:BEGIN -->
    # Request body strictness

    This API rejects requests with JSON request bodies that contain properties not declared in this specification, at any nesting level. Unknown properties result in a `400 INVALID_ARGUMENT` response.
    <!-- CAMARA:MANDATORY:request-body-strictness:END -->
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: 0.2.0-rc.1
  x-camara-commonalities: 0.8.0
servers:
  - url: '{apiRoot}/knowledge-base/v0.2rc1'
    variables:
      apiRoot:
        default: http://localhost:9091
        description: API root, defined by the service provider, e.g. `api.example.com` or `api.example.com/somepath`
tags:
  - name: Knowledge Base
    description: Knowledge base management operations
  - name: Documents
    description: Document upload operations
  - name: Tools
    description: Tool definition and execution operations
externalDocs:
  description: Product documentation at CAMARA
  url: https://github.com/camaraproject/ModelAsAService
paths:
  /knowledge-bases:
    post:
      operationId: createKnowledgeBase
      summary: Create a new knowledge base
      description: |
        Creates a new knowledge base with the provided metadata.

        **Key Features:**
        - Initializes a new knowledge base container
        - Stores name and description metadata
        - Generates unique knowledgeBaseId

        **Key Rules:**
        - Requires `name` field in request body
        - Requires `knowledge-base:knowledge-bases:create` scope
        - Name must be unique within the system

        **Response Characteristics:**
        - **201 Created**: Returns full `KnowledgeBase` object with generated ID
        - **400 Bad Request**: Missing `name` or invalid parameters
        - **403 Forbidden**: Missing required scope
        - **500 Internal Server Error**: Backend processing failure
      tags:
        - Knowledge Base
      parameters:
        - $ref: '#/components/parameters/x-correlator'
      security:
        - openId:
            - knowledge-base:knowledge-bases:create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KnowledgeBaseCreateRequest'
      responses:
        '201':
          description: Knowledge base created successfully
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeBase'
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '500':
          $ref: '#/components/responses/Generic500'
    get:
      operationId: listKnowledgeBases
      summary: Get all knowledge bases
      description: |
        Retrieves all knowledge bases accessible to the authenticated user.

        **Key Features:**
        - Returns complete collection of knowledge bases
        - Includes metadata and document lists
        - Supports pagination (implied by array response)

        **Key Rules:**
        - Requires `knowledge-base:knowledge-bases:read` scope
        - Returns empty array if no knowledge bases exist

        **Response Characteristics:**
        - **200 OK**: Array of `KnowledgeBase` objects
        - **401 Unauthenticated**: Invalid/missing credentials
        - **403 Forbidden**: Insufficient permissions
        - **500 Internal Server Error**: Data retrieval failure
      tags:
        - Knowledge Base
      parameters:
        - $ref: '#/components/parameters/x-correlator'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/perPage'
      security:
        - openId:
            - knowledge-base:knowledge-bases:read
      responses:
        '200':
          description: List of knowledge bases
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    minItems: 0
                    maxItems: 1000
                    description: List of knowledge bases accessible to the authenticated user
                    items:
                      $ref: '#/components/schemas/KnowledgeBase'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '500':
          $ref: '#/components/responses/Generic500'
  /knowledge-bases/{knowledgeBaseId}:
    parameters:
      - name: knowledgeBaseId
        in: path
        required: true
        schema:
          type: string
          format: uuid
          maxLength: 36
        description: ID of the knowledge base
      - $ref: '#/components/parameters/x-correlator'
    get:
      operationId: getKnowledgeBase
      summary: Get a specific knowledge base
      description: |
        Retrieves metadata and document list for a specific knowledge base.

        **Key Features:**
        - Returns detailed metadata (name, description)
        - Includes list of documents with filenames/formats
        - Provides document upload timestamps

        **Key Rules:**
        - Requires valid `knowledgeBaseId` path parameter
        - Requires `knowledge-base:knowledge-bases:read` scope

        **Response Characteristics:**
        - **200 OK**: Complete `KnowledgeBase` object
        - **404 Not Found**: Invalid/non-existent knowledgeBaseId
        - **403 Forbidden**: Missing required scope
        - **500 Internal Server Error**: Data retrieval failure
      tags:
        - Knowledge Base
      security:
        - openId:
            - knowledge-base:knowledge-bases:read
      responses:
        '200':
          description: Knowledge base details
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeBase'
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '404':
          $ref: '#/components/responses/Generic404'
        '500':
          $ref: '#/components/responses/Generic500'
    put:
      operationId: updateKnowledgeBase
      summary: Update a knowledge base
      description: |
        Updates metadata of an existing knowledge base.

        **Key Features:**
        - Modifies name and/or description
        - Preserves existing document associations
        - Returns updated metadata

        **Key Rules:**
        - Requires at least one update field (name/description)
        - Requires `knowledge-base:knowledge-bases:update` scope
        - knowledgeBaseId must exist

        **Response Characteristics:**
        - **200 OK**: Updated `KnowledgeBase` object
        - **400 Bad Request**: No update fields provided
        - **404 Not Found**: Invalid knowledgeBaseId
        - **403 Forbidden**: Missing required scope
        - **500 Internal Server Error**: Update processing failure
      tags:
        - Knowledge Base
      security:
        - openId:
            - knowledge-base:knowledge-bases:update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KnowledgeBaseUpdateRequest'
      responses:
        '200':
          description: Knowledge base updated successfully
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeBase'
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '404':
          $ref: '#/components/responses/Generic404'
        '500':
          $ref: '#/components/responses/Generic500'
    delete:
      operationId: deleteKnowledgeBase
      summary: Delete a knowledge base
      description: |
        Permanently deletes a knowledge base and its documents.

        **Key Features:**
        - Removes knowledge base metadata
        - Deletes all associated documents
        - Irreversible operation

        **Key Rules:**
        - Requires valid `knowledgeBaseId`
        - Requires `knowledge-base:knowledge-bases:delete` scope
        - No partial deletions

        **Response Characteristics:**
        - **204 No Content**: Successful deletion (no body)
        - **404 Not Found**: Invalid knowledgeBaseId
        - **403 Forbidden**: Missing required scope
        - **500 Internal Server Error**: Deletion processing failure
      tags:
        - Knowledge Base
      security:
        - openId:
            - knowledge-base:knowledge-bases:delete
      responses:
        '204':
          description: Knowledge base deleted successfully
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '404':
          $ref: '#/components/responses/Generic404'
        '500':
          $ref: '#/components/responses/Generic500'
  /knowledge-bases/{knowledgeBaseId}/documents:
    post:
      operationId: uploadDocument
      summary: Upload a document to a knowledge base
      description: |
        Uploads a document to a knowledge base.

        **Key Features:**
        - Supports doc/pdf/txt/csv formats
        - Stores filename and format metadata
        - Records upload timestamp

        **Key Rules:**
        - Requires valid `knowledgeBaseId`
        - Requires `knowledge-base:documents:create` scope
        - File must be sent as multipart/form-data
        - Maximum file size determined by implementation

        **Response Characteristics:**
        - **201 Created**: Success message with filename
        - **400 Bad Request**: Invalid file format
        - **415 Unsupported Media Type**: Unacceptable format
        - **404 Not Found**: Invalid knowledgeBaseId
        - **403 Forbidden**: Missing required scope
        - **500 Internal Server Error**: Storage failure
      tags:
        - Documents
      parameters:
        - name: knowledgeBaseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
            maxLength: 36
          description: ID of the knowledge base
        - $ref: '#/components/parameters/x-correlator'
      security:
        - openId:
            - knowledge-base:documents:create
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              description: Multipart form data containing the document file to upload
              additionalProperties: false
              properties:
                document:
                  type: string
                  format: binary
                  maxLength: 10485760
                  description: 'The document file to upload (supported formats: DOC, PDF, TXT, CSV)'
              required:
                - document
        required: true
      responses:
        '201':
          description: Document uploaded successfully
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    maxLength: 256
                    description: Confirmation message for the uploaded document
                    example: Document uploaded successfully
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '404':
          $ref: '#/components/responses/Generic404'
        '415':
          $ref: '#/components/responses/Generic415'
        '500':
          $ref: '#/components/responses/Generic500'
  /knowledge-bases/{knowledgeBaseId}/tools:
    post:
      operationId: createTool
      summary: Register a new tool
      description: |
        Registers a new tool in the knowledge base. A tool defines an external
        callable capability with a URL, HTTP method, and optional input/output schemas
        — similar to MCP (Model Context Protocol) tool definitions.

        **Key Features:**
        - Defines tool name, description, and endpoint URL
        - Supports multiple HTTP methods (GET, POST, PUT, DELETE)
        - Optionally describes input and output schemas

        **Key Rules:**
        - Requires valid `knowledgeBaseId`
        - `name` and `url` are required
        - Requires `knowledge-base:tools:create` scope

        **Response Characteristics:**
        - **201 Created**: Returns full `Tool` object with generated toolId
        - **400 Bad Request**: Missing required fields or invalid parameters
        - **403 Forbidden**: Missing required scope
        - **404 Not Found**: Invalid knowledgeBaseId
        - **500 Internal Server Error**: Tool creation failure
      tags:
        - Tools
      parameters:
        - name: knowledgeBaseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
            maxLength: 36
          description: ID of the knowledge base
        - $ref: '#/components/parameters/x-correlator'
      security:
        - openId:
            - knowledge-base:tools:create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToolCreateRequest'
      responses:
        '201':
          description: Tool created successfully
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tool'
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '404':
          $ref: '#/components/responses/Generic404'
        '500':
          $ref: '#/components/responses/Generic500'
    get:
      operationId: listTools
      summary: List all tools in a knowledge base
      description: |
        Retrieves all registered tools in the specified knowledge base.

        **Key Features:**
        - Returns complete collection of tools
        - Includes tool metadata (name, URL, method, schemas)
        - Supports pagination

        **Key Rules:**
        - Requires valid `knowledgeBaseId`
        - Requires `knowledge-base:tools:read` scope
        - Returns empty array if no tools exist

        **Response Characteristics:**
        - **200 OK**: Array of `Tool` objects with pagination
        - **401 Unauthenticated**: Invalid/missing credentials
        - **403 Forbidden**: Insufficient permissions
        - **404 Not Found**: Invalid knowledgeBaseId
        - **500 Internal Server Error**: Data retrieval failure
      tags:
        - Tools
      parameters:
        - name: knowledgeBaseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
            maxLength: 36
          description: ID of the knowledge base
        - $ref: '#/components/parameters/x-correlator'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/perPage'
      security:
        - openId:
            - knowledge-base:tools:read
      responses:
        '200':
          description: List of tools
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    minItems: 0
                    maxItems: 1000
                    description: List of tools registered in the knowledge base
                    items:
                      $ref: '#/components/schemas/Tool'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '404':
          $ref: '#/components/responses/Generic404'
        '500':
          $ref: '#/components/responses/Generic500'
  /knowledge-bases/{knowledgeBaseId}/tools/{toolId}:
    parameters:
      - name: knowledgeBaseId
        in: path
        required: true
        schema:
          type: string
          format: uuid
          maxLength: 36
        description: ID of the knowledge base
      - name: toolId
        in: path
        required: true
        schema:
          type: string
          format: uuid
          maxLength: 36
        description: ID of the tool
      - $ref: '#/components/parameters/x-correlator'
    get:
      operationId: getTool
      summary: Get a specific tool
      description: |
        Retrieves details of a specific tool registered in the knowledge base.

        **Key Features:**
        - Returns full tool definition including URL, method, and schemas
        - Provides creation and update timestamps

        **Key Rules:**
        - Requires valid `knowledgeBaseId` and `toolId`
        - Requires `knowledge-base:tools:read` scope

        **Response Characteristics:**
        - **200 OK**: Complete `Tool` object
        - **404 Not Found**: Invalid toolId or knowledgeBaseId
        - **403 Forbidden**: Missing required scope
        - **500 Internal Server Error**: Data retrieval failure
      tags:
        - Tools
      security:
        - openId:
            - knowledge-base:tools:read
      responses:
        '200':
          description: Tool details
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tool'
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '404':
          $ref: '#/components/responses/Generic404'
        '500':
          $ref: '#/components/responses/Generic500'
    put:
      operationId: updateTool
      summary: Update a tool
      description: |
        Updates the definition of an existing tool.

        **Key Features:**
        - Modifies tool name, URL, method, headers, or schemas
        - Returns updated tool definition

        **Key Rules:**
        - Requires valid `knowledgeBaseId` and `toolId`
        - At least one update field must be provided
        - Requires `knowledge-base:tools:update` scope

        **Response Characteristics:**
        - **200 OK**: Updated `Tool` object
        - **400 Bad Request**: No update fields provided
        - **404 Not Found**: Invalid toolId
        - **403 Forbidden**: Missing required scope
        - **500 Internal Server Error**: Update processing failure
      tags:
        - Tools
      security:
        - openId:
            - knowledge-base:tools:update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToolUpdateRequest'
      responses:
        '200':
          description: Tool updated successfully
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tool'
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '404':
          $ref: '#/components/responses/Generic404'
        '500':
          $ref: '#/components/responses/Generic500'
    delete:
      operationId: deleteTool
      summary: Delete a tool
      description: |
        Permanently removes a tool definition from the knowledge base.

        **Key Features:**
        - Irreversible deletion
        - Removes tool metadata

        **Key Rules:**
        - Requires valid `knowledgeBaseId` and `toolId`
        - Requires `knowledge-base:tools:delete` scope
        - Cannot be undone

        **Response Characteristics:**
        - **204 No Content**: Successful deletion (no body)
        - **404 Not Found**: Invalid toolId
        - **403 Forbidden**: Missing required scope
        - **500 Internal Server Error**: Deletion processing failure
      tags:
        - Tools
      security:
        - openId:
            - knowledge-base:tools:delete
      responses:
        '204':
          description: Tool deleted successfully
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '404':
          $ref: '#/components/responses/Generic404'
        '500':
          $ref: '#/components/responses/Generic500'
  /knowledge-bases/{knowledgeBaseId}/tools/{toolId}/call:
    post:
      operationId: callTool
      summary: Invoke a tool
      description: |
        Invokes a registered tool with the provided arguments. The tool will be
        executed according to its definition (URL, method, headers) and the
        result will be returned.

        **Key Features:**
        - Passes arguments to the tool's external endpoint
        - Returns the tool's execution result
        - Reports HTTP status code from the tool invocation via the `statusCode` field; the callTool endpoint itself always responds with HTTP 200 per the business-outcome modelling in CAMARA API Design Guide §3.1
        - Surfaces failure context through `contextCode` / `contextMessage`

        **Key Rules:**
        - Requires valid `knowledgeBaseId` and `toolId`
        - Requires `knowledge-base:tools:call` scope
        - Tool must be properly defined and accessible

        **Response Characteristics:**
        - **200 OK**: Returns `ToolCallResponse` with execution result (regardless of upstream outcome)
        - **400 Bad Request**: Arguments do not match tool's `inputSchema`
        - **403 Forbidden**: Missing required scope
        - **404 Not Found**: Invalid toolId or knowledgeBaseId
        - **422 Unprocessable**: Tool is disabled or arguments are semantically invalid
        - **429 Too Many Requests**: Upstream tool rate limit reached
        - **500 Internal Server Error**: Tool execution failure
      tags:
        - Tools
      parameters:
        - name: knowledgeBaseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
            maxLength: 36
          description: ID of the knowledge base
        - name: toolId
          in: path
          required: true
          schema:
            type: string
            format: uuid
            maxLength: 36
          description: ID of the tool
        - $ref: '#/components/parameters/x-correlator'
      security:
        - openId:
            - knowledge-base:tools:call
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToolCallRequest'
      responses:
        '200':
          description: Tool executed successfully
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolCallResponse'
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '404':
          $ref: '#/components/responses/Generic404'
        '422':
          $ref: '#/components/responses/ToolInvalidInput422'
        '429':
          $ref: '#/components/responses/Generic429'
        '500':
          $ref: '#/components/responses/Generic500'
components:
  securitySchemes:
    openId:
      type: openIdConnect
      openIdConnectUrl: https://example.com/.well-known/openid-configuration
      description: OpenID Connect authentication via discovery metadata.
  parameters:
    x-correlator:
      name: x-correlator
      in: header
      description: Correlation id for the different services
      schema:
        $ref: '#/components/schemas/XCorrelator'
    page:
      name: page
      in: query
      description: |
        Requested page number. Pages are 1-indexed. Values below 1 are rejected with `400 INVALID_ARGUMENT`.
      required: false
      schema:
        $ref: '#/components/schemas/Page'
    perPage:
      name: perPage
      in: query
      description: |
        Number of subscriptions to return per page. Values outside the allowed range are rejected with `400 INVALID_ARGUMENT`.
      required: false
      schema:
        $ref: '#/components/schemas/PerPage'
  headers:
    x-correlator:
      description: Correlation id for the different services
      schema:
        $ref: '#/components/schemas/XCorrelator'
  schemas:
    KnowledgeBase:
      description: A knowledge base with its metadata and associated documents
      type: object
      properties:
        knowledgeBaseId:
          type: string
          format: uuid
          maxLength: 36
          description: Unique identifier of the knowledge base
        name:
          type: string
          maxLength: 255
          description: Name of the knowledge base
        description:
          type: string
          maxLength: 4096
          description: Detailed description of the knowledge base
          x-DisplayName: description
        documents:
          type: array
          maxItems: 1000
          description: List of documents in the knowledge base
          items:
            type: object
            description: Document metadata including filename, format and upload timestamp
            required:
              - filename
              - format
              - uploadDate
            properties:
              filename:
                type: string
                maxLength: 255
                description: Name of the document file
              format:
                type: string
                enum:
                  - DOC
                  - PDF
                  - TXT
                  - CSV
                maxLength: 10
                description: File format
              uploadDate:
                $ref: '#/components/schemas/DateTime'
    KnowledgeBaseCreateRequest:
      description: Request body for creating a new knowledge base
      type: object
      required:
        - name
      additionalProperties: false
      properties:
        name:
          type: string
          maxLength: 255
          description: Name of the knowledge base
        description:
          type: string
          maxLength: 4096
          description: Detailed description of the knowledge base
          x-DisplayName: description
    KnowledgeBaseUpdateRequest:
      description: Request body for updating an existing knowledge base
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          maxLength: 255
          description: New name of the knowledge base
        description:
          type: string
          maxLength: 4096
          description: New description of the knowledge base
          x-DisplayName: description
    HeaderValue:
      type: string
      maxLength: 4096
      description: |
        HTTP header value. String only, no structured values.
        Header names are validated against RFC 7230 token syntax at runtime.
    JsonSchema:
      type: object
      description: |
        A JSON Schema document (https://json-schema.org/) describing the expected shape of tool arguments (`inputSchema`) or return values (`outputSchema`).
        The document is opaque to the API platform and passed through to the tool runtime; the tool provider is responsible for validation.
      additionalProperties: true
      example:
        type: object
        properties:
          query:
            type: string
    ToolCommon:
      type: object
      description: |
        Common properties of a tool shared across the create, update and response schemas. Not used directly in requests or responses.
      properties:
        name:
          type: string
          maxLength: 255
          description: Name of the tool. Must be unique within a knowledge base.
        description:
          type: string
          maxLength: 4096
          description: Detailed description of the tool
          x-DisplayName: description
        url:
          type: string
          format: uri
          maxLength: 2048
          description: Endpoint URL for invoking the tool
        method:
          type: string
          enum:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
          maxLength: 10
          default: POST
          description: HTTP method used to invoke the tool
        headers:
          type: object
          description: |
            Custom HTTP headers to include when invoking the tool.
            Each value is a string with a maximum length of 4096 characters.
            Up to 50 headers may be specified.
            The following reserved headers MUST NOT be included (the server will reject such requests with `400 INVALID_ARGUMENT`): `Host`, `Content-Length`, `Content-Type`, `Authorization`, `Cookie`, and any header beginning with `X-CAMARA-` or `X-Correlator-`.
          maxProperties: 50
          additionalProperties:
            $ref: '#/components/schemas/HeaderValue'
          example:
            Authorization: Bearer {{token}}
        inputSchema:
          $ref: '#/components/schemas/JsonSchema'
        outputSchema:
          $ref: '#/components/schemas/JsonSchema'
        createdAt:
          $ref: '#/components/schemas/DateTime'
        updatedAt:
          $ref: '#/components/schemas/DateTime'
    Tool:
      description: A tool registered in a knowledge base, including its definition and server-generated metadata
      allOf:
        - $ref: '#/components/schemas/ToolCommon'
        - type: object
          required:
            - toolId
          properties:
            toolId:
              type: string
              format: uuid
              maxLength: 36
              readOnly: true
              description: Unique identifier of the tool, generated by the server
            createdAt:
              description: Creation timestamp in RFC 3339 format (server-generated)
              allOf:
                - $ref: '#/components/schemas/DateTime'
                - readOnly: true
            updatedAt:
              description: Last update timestamp in RFC 3339 format (server-generated)
              allOf:
                - $ref: '#/components/schemas/DateTime'
                - readOnly: true
    ToolCreateRequest:
      description: Request body for registering a new tool in a knowledge base
      allOf:
        - $ref: '#/components/schemas/ToolCommon'
        - type: object
          required:
            - name
            - url
          additionalProperties: false
    ToolUpdateRequest:
      description: Request body for updating an existing tool definition
      allOf:
        - $ref: '#/components/schemas/ToolCommon'
        - type: object
          additionalProperties: false
          description: |
            All fields are optional for update. At least one field MUST be provided; an empty object is rejected with `400 INVALID_ARGUMENT`.
    ToolCallRequest:
      description: Request body for invoking a registered tool
      type: object
      additionalProperties: false
      required:
        - arguments
      properties:
        arguments:
          type: object
          description: |
            Arguments to pass to the tool for execution.
            The structure of this object SHOULD be compatible with the tool's `inputSchema`.
            The server validates syntactic conformance against `inputSchema` and returns `400 INVALID_ARGUMENT` for schema-level mismatches, or `422 TOOL.INVALID_INPUT` for semantic mismatches.
          additionalProperties: true
          example:
            query: What is the weather?
            maxResults: 5
    ToolCallResponse:
      description: Response payload from a tool invocation, containing the execution result or error details
      type: object
      required:
        - success
        - statusCode
      properties:
        success:
          type: boolean
          description: |
            Whether the upstream tool invocation succeeded.
            - `true`: the upstream tool returned 2xx and `result` is populated.
            - `false`: the upstream tool returned non-2xx; see `error`, `contextCode` and the `statusCode` mirror.
        statusCode:
          type: integer
          format: int32
          minimum: 100
          maximum: 599
          description: |
            HTTP status code returned by the upstream tool.
            Preserved for caller visibility. The callTool API itself responds with HTTP 200 regardless of this value, per the business-outcome modelling in CAMARA API Design Guide §3.1.
        result:
          type: object
          description: Response body returned by the upstream tool on success (empty object if no result)
          additionalProperties: true
          example: {}
          properties:
            data:
              type: object
              description: Opaque result payload from the upstream tool
        error:
          type: string
          maxLength: 2048
          description: Error message returned by the upstream tool when `success` is `false`.
        contextCode:
          type: string
          maxLength: 96
          description: |
            Optional machine-readable business context code, per CAMARA API Design Guide §3.1. Values follow the `TOOL.SCREAMING_SNAKE_CASE` convention when API-specific.
          enum:
            - TOOL.INVALID_INPUT
            - TOOL.DISABLED
            - TOOL.EXECUTION_FAILED
            - TOOL.TIMEOUT
          example: TOOL.EXECUTION_FAILED
        contextMessage:
          type: string
          maxLength: 512
          description: |
            Optional human-readable business context message, per CAMARA API Design Guide §3.1.
          example: The upstream tool returned a non-2xx status code.
    XCorrelator:
      type: string
      description: Correlator string, UUID format recommended but any string matching the pattern can be used
      pattern: ^[a-zA-Z0-9-_:;.\/<>{}]{0,256}$
      maxLength: 256
      example: b4333c46-49c0-4f62-80d7-f0ef930f1c46
    Page:
      type: integer
      format: int32
      minimum: 1
      maximum: 2147483647
      default: 1
      description: Current page number (1-indexed).
      example: 1
    PerPage:
      type: integer
      format: int32
      minimum: 1
      maximum: 100
      default: 20
      description: Number of items per page.
      example: 20
    DateTime:
      type: string
      format: date-time
      maxLength: 64
      description: Timestamp. It must follow [RFC 3339](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6) and must have time zone.
      example: '2018-04-05T17:31:00Z'
    TotalCount:
      type: integer
      format: int32
      minimum: 0
      maximum: 2147483647
      description: Total number of items matching the query, after filters applied. MAY be omitted where a full count query is prohibitively expensive.
      example: 87
    TotalPages:
      type: integer
      format: int32
      minimum: 0
      maximum: 2147483647
      description: Total number of pages. Equals ceil(totalCount / perPage). MAY be omitted where totalCount is omitted.
      example: 5
    Pagination:
      description: Pagination details helping to navigate through paged results efficiently.
      type: object
      properties:
        page:
          $ref: '#/components/schemas/Page'
        perPage:
          $ref: '#/components/schemas/PerPage'
        totalCount:
          $ref: '#/components/schemas/TotalCount'
        totalPages:
          $ref: '#/components/schemas/TotalPages'
    ErrorInfo:
      type: object
      description: A structured error response providing details about a failed request, including the HTTP status code, an error code, and a human-readable message
      required:
        - status
        - code
        - message
      properties:
        status:
          type: integer
          format: int32
          minimum: 100
          maximum: 599
          description: HTTP response status code
        code:
          type: string
          maxLength: 96
          description: A human-readable code to describe the error
        message:
          type: string
          maxLength: 512
          description: A human-readable description of what the event represents
  responses:
    Generic400:
      description: Bad Request
      headers:
        x-correlator:
          $ref: '#/components/headers/x-correlator'
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ErrorInfo'
              - type: object
                properties:
                  status:
                    enum:
                      - 400
                  code:
                    enum:
                      - INVALID_ARGUMENT
                      - OUT_OF_RANGE
          examples:
            GENERIC_400_INVALID_ARGUMENT:
              description: Invalid Argument. Generic Syntax Exception
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: Client specified an invalid argument, request body or query param.
            GENERIC_400_OUT_OF_RANGE:
              description: Out of Range. Specific Syntax Exception used when a given field has a pre-defined range or a invalid filter criteria combination is requested
              value:
                status: 400
                code: OUT_OF_RANGE
                message: Client specified an invalid range.
    Generic401:
      description: Unauthorized
      headers:
        x-correlator:
          $ref: '#/components/headers/x-correlator'
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ErrorInfo'
              - type: object
                properties:
                  status:
                    enum:
                      - 401
                  code:
                    enum:
                      - UNAUTHENTICATED
          examples:
            GENERIC_401_UNAUTHENTICATED:
              description: Request cannot be authenticated and a new authentication is required
              value:
                status: 401
                code: UNAUTHENTICATED
                message: Request not authenticated due to missing, invalid, or expired credentials. A new authentication is required.
    Generic403:
      description: Forbidden
      headers:
        x-correlator:
          $ref: '#/components/headers/x-correlator'
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ErrorInfo'
              - type: object
                properties:
                  status:
                    enum:
                      - 403
                  code:
                    enum:
                      - PERMISSION_DENIED
                      - INVALID_TOKEN_CONTEXT
          examples:
            GENERIC_403_PERMISSION_DENIED:
              description: Permission denied. OAuth2 token access does not have the required scope or when the user fails operational security
              value:
                status: 403
                code: PERMISSION_DENIED
                message: Client does not have sufficient permissions to perform this action.
            GENERIC_403_INVALID_TOKEN_CONTEXT:
              description: Reflect some inconsistency between information in some field of the API and the related OAuth2 Token
              value:
                status: 403
                code: INVALID_TOKEN_CONTEXT
                message: Request body is not consistent with access token.
    Generic404:
      description: Not found
      headers:
        x-correlator:
          $ref: '#/components/headers/x-correlator'
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ErrorInfo'
              - type: object
                properties:
                  status:
                    enum:
                      - 404
                  code:
                    enum:
                      - NOT_FOUND
                      - IDENTIFIER_NOT_FOUND
          examples:
            GENERIC_404_NOT_FOUND:
              description: Resource is not found
              value:
                status: 404
                code: NOT_FOUND
                message: The specified resource is not found.
            GENERIC_404_IDENTIFIER_NOT_FOUND:
              description: Some identifier cannot be matched to a device
              value:
                status: 404
                code: IDENTIFIER_NOT_FOUND
                message: Device identifier not found.
    Generic415:
      description: Unsupported Media Type
      headers:
        x-correlator:
          $ref: '#/components/headers/x-correlator'
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ErrorInfo'
              - type: object
                properties:
                  status:
                    enum:
                      - 415
                  code:
                    enum:
                      - UNSUPPORTED_MEDIA_TYPE
          examples:
            GENERIC_415_UNSUPPORTED_MEDIA_TYPE:
              description: Payload format of the request is in an unsupported format by the Server. Should not happen
              value:
                status: 415
                code: UNSUPPORTED_MEDIA_TYPE
                message: The server refuses to accept the request because the payload format is in an unsupported format.
    Generic500:
      description: Internal Server Error
      headers:
        x-correlator:
          $ref: '#/components/headers/x-correlator'
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ErrorInfo'
              - type: object
                properties:
                  status:
                    enum:
                      - 500
                  code:
                    enum:
                      - INTERNAL
          examples:
            GENERIC_500_INTERNAL:
              description: Problem in Server side. Regular Server Exception
              value:
                status: 500
                code: INTERNAL
                message: Unknown server error. Typically a server bug.
    ToolInvalidInput422:
      description: |
        The tool arguments are semantically invalid (e.g. the tool is disabled, or arguments fail business-rule validation even though they are syntactically valid against the `inputSchema`).
      headers:
        x-correlator:
          $ref: '#/components/headers/x-correlator'
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ErrorInfo'
              - type: object
                properties:
                  status:
                    enum:
                      - 422
                  code:
                    enum:
                      - TOOL.INVALID_INPUT
                      - TOOL.DISABLED
          examples:
            TOOL_422_INVALID_INPUT:
              description: Tool arguments failed semantic validation
              value:
                status: 422
                code: TOOL.INVALID_INPUT
                message: The provided arguments failed the tool's business-rule validation.
            TOOL_422_DISABLED:
              description: Tool is currently disabled
              value:
                status: 422
                code: TOOL.DISABLED
                message: The requested tool is currently disabled and cannot be invoked.
    Generic429:
      description: Too Many Requests
      headers:
        x-correlator:
          $ref: '#/components/headers/x-correlator'
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ErrorInfo'
              - type: object
                properties:
                  status:
                    enum:
                      - 429
                  code:
                    enum:
                      - QUOTA_EXCEEDED
                      - TOO_MANY_REQUESTS
          examples:
            GENERIC_429_QUOTA_EXCEEDED:
              description: Request is rejected due to exceeding a business quota limit
              value:
                status: 429
                code: QUOTA_EXCEEDED
                message: Out of resource quota.
            GENERIC_429_TOO_MANY_REQUESTS:
              description: Access to the API has been temporarily blocked due to rate or spike arrest limits being reached
              value:
                status: 429
                code: TOO_MANY_REQUESTS
                message: Rate limit reached.
