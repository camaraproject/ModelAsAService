openapi: 3.0.3
info:
  title: Q&A Assistant - Manage
  description: |
    This API provides CRUD (Create, Read, Update, Delete) management functions for the Question and Answer (Q&A) Assistant, aiming to equip developers with the capability to configure and manage intelligent question-answering systems based on Large Language Models (LLMs).
    It supports model parameter tuning, knowledge base association, and prompt engineering configuration, making it suitable for building customizable intelligent customer service or question-answering services.

    The following scopes are required:
    - qa-assistant-manage:assistants:create - Create new assistants
    - qa-assistant-manage:assistants:read - Read assistant details
    - qa-assistant-manage:assistants:update - Update existing assistants
    - qa-assistant-manage:assistants:delete - Delete assistants

    <!-- CAMARA:MANDATORY:authorization-and-authentication:BEGIN -->
    # Authorization and authentication

    The "Camara Security and Interoperability Profile" provides details of how an API consumer requests an access token. Please refer to Identity and Consent Management (https://github.com/camaraproject/IdentityAndConsentManagement/) for the released version of the profile.

    The specific authorization flows to be used will be agreed upon during the onboarding process, happening between the API consumer and the API provider, taking into account the declared purpose for accessing the API, whilst also being subject to the prevailing legal framework dictated by local legislation.

    In cases where personal data is processed by the API and users can exercise their rights through mechanisms such as opt-in and/or opt-out, the use of three-legged access tokens is mandatory. This ensures that the API remains in compliance with privacy regulations, upholding the principles of transparency and user-centric privacy-by-design.
    <!-- CAMARA:MANDATORY:authorization-and-authentication:END -->

    <!-- CAMARA:MANDATORY:additional-error-responses:BEGIN -->
    # Additional CAMARA error responses

    The list of error codes in this API specification is not exhaustive. Therefore the API specification MAY not document some non-mandatory error statuses as indicated in `CAMARA API Design Guide`.

    Please refer to the `CAMARA_common.yaml` of the Commonalities Release associated to this API version for a complete list of error responses. The applicable Commonalities Release can be identified in the `API Readiness Checklist` document associated to this API version.

    As a specific rule, error `501 - NOT_IMPLEMENTED` can be only a possible error response if it is explicitly documented in the API.
    <!-- CAMARA:MANDATORY:additional-error-responses:END -->

    <!-- CAMARA:MANDATORY:request-body-strictness:BEGIN -->
    # Request body strictness

    This API rejects requests with JSON request bodies that contain properties not declared in this specification, at any nesting level. Unknown properties result in a `400 INVALID_ARGUMENT` response.
    <!-- CAMARA:MANDATORY:request-body-strictness:END -->
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: 0.2.0-rc.1
  x-camara-commonalities: 0.8.0
servers:
  - url: '{apiRoot}/qa-assistant-manage/v0.2rc1'
    variables:
      apiRoot:
        default: http://localhost:9091
        description: API root, defined by the service provider, e.g. `api.example.com` or `api.example.com/somepath`
tags:
  - name: Assistants
    description: QA assistant management operations
externalDocs:
  description: Product documentation at CAMARA
  url: https://github.com/camaraproject/ModelAsAService
paths:
  /assistants:
    post:
      operationId: createAssistant
      summary: Create a new QA assistant
      description: |
        Creates a new QA assistant configuration.

        **Key Features:**
        - Configures LLM parameters (model, temperature, maxTokens)
        - Associates with knowledge bases
        - Sets behavior-defining prompts

        **Key Rules:**
        - Requires `name`, `configurationPrompt`, and `largeModelParameters`
        - `largeModelParameters` must include `model`, `temperature` (0.0-1.0), `maxTokens` (≥1)
        - Needs `qa-assistant-manage:assistants:create` scope

        **Response Characteristics:**
        - **201 Created**: Returns `AssistantResponse` with generated assistantId
        - **400 Bad Request**: Missing parameters or invalid values (e.g., temperature out of range)
        - **403 Forbidden**: Missing required scope
        - **500 Internal Server Error**: Assistant creation failure
      tags:
        - Assistants
      parameters:
        - $ref: '#/components/parameters/x-correlator'
      security:
        - openId:
            - qa-assistant-manage:assistants:create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssistantCreateRequest'
      responses:
        '201':
          description: Assistant created successfully
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssistantResponse'
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '422':
          $ref: '#/components/responses/InvalidToolIds422'
        '500':
          $ref: '#/components/responses/Generic500'
    get:
      operationId: listAssistants
      summary: List all QA assistants
      description: |
        Retrieves all configured QA assistants.

        **Key Features:**
        - Returns complete assistant configurations
        - Includes metadata (createdAt, updatedAt)
        - Shows associated knowledge bases

        **Key Rules:**
        - Requires `qa-assistant-manage:assistants:read` scope
        - Returns empty array if no assistants exist

        **Response Characteristics:**
        - **200 OK**: Array of `Assistant` objects
        - **401 Unauthenticated**: Invalid credentials
        - **403 Forbidden**: Insufficient permissions
        - **500 Internal Server Error**: Data retrieval failure
      tags:
        - Assistants
      parameters:
        - $ref: '#/components/parameters/x-correlator'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/perPage'
      security:
        - openId:
            - qa-assistant-manage:assistants:read
      responses:
        '200':
          description: List of assistants
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    minItems: 0
                    maxItems: 1000
                    description: List of configured QA assistants
                    items:
                      $ref: '#/components/schemas/Assistant'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '500':
          $ref: '#/components/responses/Generic500'
  /assistants/{assistantId}:
    parameters:
      - name: assistantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
          maxLength: 36
        description: Unique identifier of the assistant
      - $ref: '#/components/parameters/x-correlator'
    get:
      operationId: getAssistant
      summary: Get a specific QA assistant
      description: |
        Retrieves detailed configuration for a specific assistant.

        **Key Features:**
        - Returns full LLM parameter configuration
        - Includes knowledge base associations
        - Shows prompt configurations

        **Key Rules:**
        - Requires valid UUID `assistantId`
        - Needs `qa-assistant-manage:assistants:read` scope

        **Response Characteristics:**
        - **200 OK**: Complete `Assistant` object
        - **404 Not Found**: Invalid/non-existent assistantId
        - **403 Forbidden**: Missing required scope
        - **500 Internal Server Error**: Configuration retrieval failure
      tags:
        - Assistants
      security:
        - openId:
            - qa-assistant-manage:assistants:read
      responses:
        '200':
          description: Assistant details
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assistant'
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '404':
          $ref: '#/components/responses/Generic404'
        '500':
          $ref: '#/components/responses/Generic500'
    put:
      operationId: updateAssistant
      summary: Update a QA assistant
      description: |
        Modifies an existing QA assistant configuration.

        **Key Features:**
        - Updates LLM parameters dynamically
        - Changes knowledge base associations
        - Modifies behavior prompts

        **Key Rules:**
        - Requires valid UUID `assistantId`
        - At least one update field must be provided
        - Parameter values must meet constraints (e.g., temperature 0.0-1.0)
        - Needs `qa-assistant-manage:assistants:update` scope

        **Response Characteristics:**
        - **200 OK**: Returns updated `AssistantResponse`
        - **400 Bad Request**: Invalid parameters or no update fields
        - **404 Not Found**: Invalid assistantId
        - **403 Forbidden**: Missing required scope
        - **500 Internal Server Error**: Update processing failure
      tags:
        - Assistants
      security:
        - openId:
            - qa-assistant-manage:assistants:update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssistantUpdateRequest'
      responses:
        '200':
          description: Assistant updated successfully
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssistantResponse'
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '404':
          $ref: '#/components/responses/Generic404'
        '422':
          $ref: '#/components/responses/InvalidToolIds422'
    delete:
      operationId: deleteAssistant
      summary: Delete a QA assistant
      description: |
        Permanently removes a QA assistant configuration.

        **Key Features:**
        - Irreversible deletion
        - Cleans up associated resources
        - Immediate deactivation

        **Key Rules:**
        - Requires valid UUID `assistantId`
        - Needs `qa-assistant-manage:assistants:delete` scope
        - Cannot be undone

        **Response Characteristics:**
        - **204 No Content**: Successful deletion (no body)
        - **404 Not Found**: Invalid assistantId
        - **403 Forbidden**: Missing required scope
        - **500 Internal Server Error**: Deletion processing failure
      tags:
        - Assistants
      security:
        - openId:
            - qa-assistant-manage:assistants:delete
      responses:
        '204':
          description: Assistant deleted successfully
          headers:
            x-correlator:
              $ref: '#/components/headers/x-correlator'
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '404':
          $ref: '#/components/responses/Generic404'
        '500':
          $ref: '#/components/responses/Generic500'
components:
  securitySchemes:
    openId:
      type: openIdConnect
      openIdConnectUrl: https://example.com/.well-known/openid-configuration
      description: OpenID Connect authentication via discovery metadata.
  parameters:
    x-correlator:
      name: x-correlator
      in: header
      description: Correlation id for the different services
      schema:
        $ref: '#/components/schemas/XCorrelator'
    page:
      name: page
      in: query
      description: |
        Requested page number. Pages are 1-indexed. Values below 1 are rejected with `400 INVALID_ARGUMENT`.
      required: false
      schema:
        $ref: '#/components/schemas/Page'
    perPage:
      name: perPage
      in: query
      description: |
        Number of subscriptions to return per page. Values outside the allowed range are rejected with `400 INVALID_ARGUMENT`.
      required: false
      schema:
        $ref: '#/components/schemas/PerPage'
  headers:
    x-correlator:
      description: Correlation id for the different services
      schema:
        $ref: '#/components/schemas/XCorrelator'
  schemas:
    AssistantCreateRequest:
      description: Request body for creating a new QA assistant configuration
      type: object
      required:
        - name
        - configurationPrompt
        - largeModelParameters
      additionalProperties: false
      properties:
        name:
          type: string
          maxLength: 255
          description: Name of the assistant
        description:
          type: string
          maxLength: 4096
          description: Description of the assistant
          x-DisplayName: description
        knowledgeBaseId:
          type: string
          format: uuid
          maxLength: 36
          description: |
            Optional ID of the associated knowledge base. When provided together with `toolIds`, every tool listed in `toolIds` MUST belong to this knowledge base; otherwise the server returns `422 KNOWLEDGE_BASE.TOOL_NOT_FOUND`.
        toolIds:
          type: array
          uniqueItems: true
          minItems: 1
          maxItems: 100
          items:
            type: string
            format: uuid
            maxLength: 36
            description: UUID of a tool registered in the associated knowledge base
          description: |
            Optional IDs of tools from the knowledge base to associate with this assistant. Duplicates are rejected with `400 INVALID_ARGUMENT`.
            **Cross-API contract (CAMARA ModelAsAService):** every tool ID MUST reference an existing tool owned by the `knowledge-base` API. If `knowledgeBaseId` is also provided, every tool listed here MUST belong to that knowledge base.
            **Lifecycle behaviour when a referenced tool is deleted:** if a tool listed here is later removed via `DELETE /knowledge-bases/{id}/tools/{toolId}` of the `knowledge-base` API, the server MAY either retain the dangling reference (and return `422 KNOWLEDGE_BASE.TOOL_NOT_FOUND` on subsequent reads) or silently drop it from the `toolIds` array on the next read. Implementations SHOULD document their behaviour.
        configurationPrompt:
          type: string
          maxLength: 8192
          description: Configuration prompt for the assistant
        largeModelParameters:
          type: object
          description: Parameters for the large language model
          required:
            - model
            - parameters
          additionalProperties: false
          properties:
            model:
              type: string
              maxLength: 128
              description: Name of the large language model
              example: gpt-4
            parameters:
              type: object
              description: Model-specific parameters controlling generation behaviour
              required:
                - temperature
                - maxTokens
              additionalProperties: false
              properties:
                temperature:
                  type: number
                  format: float
                  minimum: 0
                  maximum: 1
                  description: Sampling temperature for generation (0.0 = deterministic, 1.0 = maximally creative)
                  example: 0.7
                maxTokens:
                  type: integer
                  format: int32
                  minimum: 1
                  maximum: 128000
                  description: Maximum number of tokens to generate
                  example: 200
                topP:
                  type: number
                  format: float
                  minimum: 0
                  maximum: 1
                  description: Nucleus sampling parameter (top-p)
                  example: 0.8
        openingRemarks:
          type: string
          maxLength: 4096
          description: Optional opening remarks for the assistant
    AssistantUpdateRequest:
      description: Request body for updating an existing QA assistant configuration
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          maxLength: 255
          description: New name of the assistant
        description:
          type: string
          maxLength: 4096
          description: New description of the assistant
          x-DisplayName: description
        knowledgeBaseId:
          type: string
          format: uuid
          maxLength: 36
          description: |
            Optional new knowledge base ID. Same cross-API contract as on create: when provided together with `toolIds`, every tool listed in `toolIds` MUST belong to this knowledge base; otherwise the server returns `422 KNOWLEDGE_BASE.TOOL_NOT_FOUND`.
        toolIds:
          type: array
          uniqueItems: true
          minItems: 1
          maxItems: 100
          items:
            type: string
            format: uuid
            maxLength: 36
            description: UUID of a tool registered in the associated knowledge base
          description: |
            Optional new set of tool IDs to associate with this assistant.
            Duplicates are rejected with `400 INVALID_ARGUMENT`. Same cross-API contract as on create.
        configurationPrompt:
          type: string
          maxLength: 8192
          description: Updated configuration prompt
        largeModelParameters:
          type: object
          description: Updated model parameters
          additionalProperties: false
          properties:
            model:
              type: string
              maxLength: 128
              description: Name of the large language model
            parameters:
              type: object
              description: Model-specific parameters controlling generation behaviour
              additionalProperties: false
              properties:
                temperature:
                  type: number
                  format: float
                  minimum: 0
                  maximum: 1
                  description: Sampling temperature for generation (0.0 = deterministic, 1.0 = maximally creative)
                maxTokens:
                  type: integer
                  format: int32
                  minimum: 1
                  maximum: 128000
                  description: Maximum number of tokens to generate
                topP:
                  type: number
                  format: float
                  minimum: 0
                  maximum: 1
                  description: Nucleus sampling parameter (top-p)
        openingRemarks:
          type: string
          maxLength: 4096
          description: Updated opening remarks
    Assistant:
      description: A QA assistant configuration including LLM parameters, knowledge base associations, and prompts
      type: object
      properties:
        assistantId:
          type: string
          format: uuid
          maxLength: 36
          description: Unique identifier of the assistant
          example: a1b2c3d4-5678-90ab-cdef-1234567890ab
        name:
          type: string
          maxLength: 255
          description: Name of the assistant
        description:
          type: string
          maxLength: 4096
          description: Description of the assistant
          x-DisplayName: description
        knowledgeBaseId:
          type: string
          format: uuid
          maxLength: 36
          description: ID of the associated knowledge base
        toolIds:
          type: array
          uniqueItems: true
          minItems: 1
          maxItems: 100
          items:
            type: string
            format: uuid
            maxLength: 36
            description: UUID of a tool registered in the associated knowledge base
          description: |
            IDs of tools from the knowledge base associated with this assistant.
            Tools may be pruned by the server if they have been deleted from the knowledge base after the assistant was last updated.
        configurationPrompt:
          type: string
          maxLength: 8192
          description: Configuration prompt for the assistant
        largeModelParameters:
          type: object
          description: Parameters for the large language model
          properties:
            model:
              type: string
              maxLength: 128
              description: Name of the large language model
            parameters:
              type: object
              description: Model-specific parameters
              properties:
                temperature:
                  type: number
                  format: float
                  minimum: 0
                  maximum: 1
                  description: Sampling temperature for generation (0.0 = deterministic, 1.0 = maximally creative)
                maxTokens:
                  type: integer
                  format: int32
                  minimum: 1
                  maximum: 128000
                  description: Maximum number of tokens to generate
                topP:
                  type: number
                  format: float
                  minimum: 0
                  maximum: 1
                  description: Nucleus sampling parameter (top-p)
        openingRemarks:
          type: string
          maxLength: 4096
          description: Opening remarks for the assistant
        createdAt:
          $ref: '#/components/schemas/DateTime'
        updatedAt:
          $ref: '#/components/schemas/DateTime'
    AssistantResponse:
      type: object
      description: Response payload returned after creating or updating an assistant
      properties:
        success:
          type: boolean
          description: Whether the operation succeeded
        assistantId:
          type: string
          format: uuid
          maxLength: 36
          description: Unique identifier of the assistant
        message:
          type: string
          maxLength: 512
          description: Success or failure message describing the result of the operation
    XCorrelator:
      type: string
      description: Correlator string, UUID format recommended but any string matching the pattern can be used
      pattern: ^[a-zA-Z0-9-_:;.\/<>{}]{0,256}$
      maxLength: 256
      example: b4333c46-49c0-4f62-80d7-f0ef930f1c46
    Page:
      type: integer
      format: int32
      minimum: 1
      maximum: 2147483647
      default: 1
      description: Current page number (1-indexed).
      example: 1
    PerPage:
      type: integer
      format: int32
      minimum: 1
      maximum: 100
      default: 20
      description: Number of items per page.
      example: 20
    DateTime:
      type: string
      format: date-time
      maxLength: 64
      description: Timestamp. It must follow [RFC 3339](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6) and must have time zone.
      example: '2018-04-05T17:31:00Z'
    TotalCount:
      type: integer
      format: int32
      minimum: 0
      maximum: 2147483647
      description: Total number of items matching the query, after filters applied. MAY be omitted where a full count query is prohibitively expensive.
      example: 87
    TotalPages:
      type: integer
      format: int32
      minimum: 0
      maximum: 2147483647
      description: Total number of pages. Equals ceil(totalCount / perPage). MAY be omitted where totalCount is omitted.
      example: 5
    Pagination:
      description: Pagination details helping to navigate through paged results efficiently.
      type: object
      properties:
        page:
          $ref: '#/components/schemas/Page'
        perPage:
          $ref: '#/components/schemas/PerPage'
        totalCount:
          $ref: '#/components/schemas/TotalCount'
        totalPages:
          $ref: '#/components/schemas/TotalPages'
    ErrorInfo:
      type: object
      description: A structured error response providing details about a failed request, including the HTTP status code, an error code, and a human-readable message
      required:
        - status
        - code
        - message
      properties:
        status:
          type: integer
          format: int32
          minimum: 100
          maximum: 599
          description: HTTP response status code
        code:
          type: string
          maxLength: 96
          description: A human-readable code to describe the error
        message:
          type: string
          maxLength: 512
          description: A human-readable description of what the event represents
  responses:
    Generic400:
      description: Bad Request
      headers:
        x-correlator:
          $ref: '#/components/headers/x-correlator'
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ErrorInfo'
              - type: object
                properties:
                  status:
                    enum:
                      - 400
                  code:
                    enum:
                      - INVALID_ARGUMENT
                      - OUT_OF_RANGE
          examples:
            GENERIC_400_INVALID_ARGUMENT:
              description: Invalid Argument. Generic Syntax Exception
              value:
                status: 400
                code: INVALID_ARGUMENT
                message: Client specified an invalid argument, request body or query param.
            GENERIC_400_OUT_OF_RANGE:
              description: Out of Range. Specific Syntax Exception used when a given field has a pre-defined range or a invalid filter criteria combination is requested
              value:
                status: 400
                code: OUT_OF_RANGE
                message: Client specified an invalid range.
    Generic401:
      description: Unauthorized
      headers:
        x-correlator:
          $ref: '#/components/headers/x-correlator'
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ErrorInfo'
              - type: object
                properties:
                  status:
                    enum:
                      - 401
                  code:
                    enum:
                      - UNAUTHENTICATED
          examples:
            GENERIC_401_UNAUTHENTICATED:
              description: Request cannot be authenticated and a new authentication is required
              value:
                status: 401
                code: UNAUTHENTICATED
                message: Request not authenticated due to missing, invalid, or expired credentials. A new authentication is required.
    Generic403:
      description: Forbidden
      headers:
        x-correlator:
          $ref: '#/components/headers/x-correlator'
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ErrorInfo'
              - type: object
                properties:
                  status:
                    enum:
                      - 403
                  code:
                    enum:
                      - PERMISSION_DENIED
                      - INVALID_TOKEN_CONTEXT
          examples:
            GENERIC_403_PERMISSION_DENIED:
              description: Permission denied. OAuth2 token access does not have the required scope or when the user fails operational security
              value:
                status: 403
                code: PERMISSION_DENIED
                message: Client does not have sufficient permissions to perform this action.
            GENERIC_403_INVALID_TOKEN_CONTEXT:
              description: Reflect some inconsistency between information in some field of the API and the related OAuth2 Token
              value:
                status: 403
                code: INVALID_TOKEN_CONTEXT
                message: Request body is not consistent with access token.
    Generic404:
      description: Not found
      headers:
        x-correlator:
          $ref: '#/components/headers/x-correlator'
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ErrorInfo'
              - type: object
                properties:
                  status:
                    enum:
                      - 404
                  code:
                    enum:
                      - NOT_FOUND
                      - IDENTIFIER_NOT_FOUND
          examples:
            GENERIC_404_NOT_FOUND:
              description: Resource is not found
              value:
                status: 404
                code: NOT_FOUND
                message: The specified resource is not found.
            GENERIC_404_IDENTIFIER_NOT_FOUND:
              description: Some identifier cannot be matched to a device
              value:
                status: 404
                code: IDENTIFIER_NOT_FOUND
                message: Device identifier not found.
    Generic500:
      description: Internal Server Error
      headers:
        x-correlator:
          $ref: '#/components/headers/x-correlator'
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ErrorInfo'
              - type: object
                properties:
                  status:
                    enum:
                      - 500
                  code:
                    enum:
                      - INTERNAL
          examples:
            GENERIC_500_INTERNAL:
              description: Problem in Server side. Regular Server Exception
              value:
                status: 500
                code: INTERNAL
                message: Unknown server error. Typically a server bug.
    InvalidToolIds422:
      description: |
        One or more IDs in `toolIds` are invalid in the context of this assistant: they either do not exist, or do not belong to the `knowledgeBaseId` referenced in the same request.
      headers:
        x-correlator:
          $ref: '#/components/headers/x-correlator'
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ErrorInfo'
              - type: object
                properties:
                  status:
                    enum:
                      - 422
                  code:
